<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" fill="none">
  <!-- Icon: Circular wing/ship emblem -->
  <g transform="translate(4, 4)">
    <!-- Outer circle swoosh -->
    <path d="M32 4 C18 4 6 16 6 30 C6 44 18 56 32 56 C46 56 58 44 58 30" stroke="#D32F2F" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Wing -->
    <path d="M38 10 C46 8 58 12 62 18 C58 16 50 16 44 20 Z" fill="#1A2B5F"/>
    <path d="M36 12 C42 10 52 14 55 20 C51 18 45 18 40 22 Z" fill="#1A2B5F" opacity="0.6"/>
    <!-- Ship hull -->
    <path d="M14 34 L50 34 L47 42 C47 42 40 46 32 46 C24 46 17 42 17 42 Z" fill="#1A2B5F"/>
    <!-- Ship deck -->
    <rect x="22" y="28" width="20" height="6" rx="1" fill="#D32F2F"/>
    <rect x="30" y="22" width="4" height="6" fill="#1A2B5F"/>
    <!-- Water waves -->
    <path d="M8 50 Q16 47 24 50 Q32 53 40 50 Q48 47 56 50" stroke="#1A2B5F" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M10 55 Q18 52 26 55 Q34 58 42 55 Q50 52 58 55" stroke="#1A2B5F" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- Road -->
    <path d="M20 44 L26 56 M44 44 L38 56" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- NEXORA text -->
  <text x="78" y="44" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="32" letter-spacing="-0.5">
    <tspan fill="#D32F2F">NEX</tspan><tspan fill="#1A2B5F">ORA</tspan>
  </text>

  <!-- SHIPPING text -->
  <text x="80" y="60" font-family="Arial, sans-serif" font-weight="700" font-size="11.5" fill="#1A2B5F" letter-spacing="5">SHIPPING</text>
</svg>
